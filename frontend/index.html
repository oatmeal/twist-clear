<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Clips Viewer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="calendar.css">
  <script type="module" src="/src/main.ts"></script>
</head>
<body>

<header>
  <h1>Twitch Clips</h1>
  <span class="streamer-tag" id="streamer-tag"></span>
  <button id="lang-toggle" class="lang-toggle"></button>
</header>

<div id="controls">
  <input type="search" id="search" placeholder="Search clip titles…" autocomplete="off">
  <select id="sort">
    <option value="view_count_desc">Most Viewed</option>
    <option value="view_count_asc">Least Viewed</option>
    <option value="date_desc">Newest First</option>
    <option value="date_asc">Oldest First</option>
  </select>
  <select id="game-filter">
    <option value="">All Games</option>
  </select>
  <div class="date-range-filter">
    <input type="date" id="date-from-input" title="From date">
    <span class="date-range-sep">–</span>
    <input type="date" id="date-to-input" title="To date (inclusive)">
  </div>
  <div class="view-switcher">
    <button id="btn-view-grid" class="view-btn active">Grid</button>
    <button id="btn-view-cal"  class="view-btn">Calendar</button>
  </div>
  <span id="result-count"></span>
</div>

<main>
  <div id="calendar-panel" style="display:none">
    <div id="cal-header">
      <div id="cal-breadcrumb"></div>
      <div id="cal-nav-controls">
        <div id="cal-year-nav">
          <button id="cal-prev-year">&#8249;</button>
          <select id="cal-year-select" class="cal-nav-select"></select>
          <button id="cal-next-year">&#8250;</button>
        </div>
        <div id="cal-month-nav" style="display:none">
          <button id="cal-prev-month">&#8249;</button>
          <select id="cal-month-select" class="cal-nav-select"></select>
          <button id="cal-next-month">&#8250;</button>
        </div>
        <div id="cal-day-nav" style="display:none">
          <button id="cal-prev-day">&#8249;</button>
          <select id="cal-day-select" class="cal-nav-select"></select>
          <button id="cal-next-day">&#8250;</button>
        </div>
      </div>
    </div>
    <div id="cal-year-view"></div>
    <div id="cal-month-view" style="display:none">
      <div id="cal-year-strip"></div>
      <div id="cal-month-grid"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">Loading clips database…</p>
  </div>
  <div id="error"></div>
  <div id="empty">No clips match your search.</div>
  <div id="clips-grid"></div>
  <div id="pagination"></div>
</main>

</body>
</html>
