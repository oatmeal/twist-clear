<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Clips Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0e0e;
      --surface:     #1f1f23;
      --surface2:    #26262c;
      --border:      #3a3a40;
      --text:        #efeff1;
      --muted:       #adadb8;
      --accent:      #9147ff;
      --accent-h:    #a970ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
    }
    header .streamer-tag {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Controls bar ── */
    #controls {
      display: none;
      padding: 12px 24px;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #search {
      flex: 1 1 200px;
      max-width: 360px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    #result-count {
      color: var(--muted);
      font-size: 13px;
      margin-left: auto;
    }

    /* ── Main area ── */
    main { padding: 24px; }

    /* ── Loading / Error ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      background: #2d1515;
      border: 1px solid #6b2020;
      border-radius: 8px;
      padding: 14px 18px;
      color: #f99;
      font-size: 13px;
      line-height: 1.6;
    }
    #error code { font-family: monospace; background: rgba(0,0,0,.3); padding: 2px 5px; border-radius: 3px; }

    /* ── Clip grid ── */
    #clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .clip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .clip-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .clip-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background: var(--surface2);
      overflow: hidden;
    }
    .clip-thumb a { display: block; width: 100%; height: 100%; }
    .clip-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .clip-thumb img.broken { opacity: 0.2; }

    .clip-play-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      background: rgba(0,0,0,.35);
      transition: opacity 0.15s;
    }
    .clip-card:hover .clip-play-icon { opacity: 1; }
    .clip-play-icon svg { width: 40px; height: 40px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); }

    .clip-duration {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,.8);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .clip-info { padding: 10px 12px 12px; }

    .clip-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .clip-title a { color: var(--text); text-decoration: none; }
    .clip-title a:hover { color: var(--accent); }

    .clip-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .clip-meta span { font-size: 12px; color: var(--muted); }
    .clip-meta .views { color: var(--accent-h); font-weight: 600; }

    /* ── Empty state ── */
    #empty {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Pagination ── */
    #pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 32px;
    }
    #pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.12s, background 0.12s;
    }
    #pagination button:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--surface2);
    }
    #pagination button:disabled { opacity: 0.35; cursor: not-allowed; }
    #pagination button.active {
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 700;
    }
    .pg-ellipsis { color: var(--muted); font-size: 13px; padding: 0 4px; }
  </style>
</head>
<body>

<header>
  <h1>Twitch Clips</h1>
  <span class="streamer-tag" id="streamer-tag"></span>
</header>

<div id="controls">
  <input type="search" id="search" placeholder="Search clip titles…" autocomplete="off">
  <select id="sort">
    <option value="view_count_desc">Most Viewed</option>
    <option value="view_count_asc">Least Viewed</option>
    <option value="date_desc">Newest First</option>
    <option value="date_asc">Oldest First</option>
  </select>
  <select id="game-filter">
    <option value="">All Games</option>
  </select>
  <span id="result-count"></span>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading clips database…</p>
  </div>
  <div id="error"></div>
  <div id="empty">No clips match your search.</div>
  <div id="clips-grid"></div>
  <div id="pagination"></div>
</main>

<script>
// Path to the SQLite DB relative to this HTML file when served via HTTP.
const DB_URL = '../data/clips.db';
const PAGE_SIZE = 24;

let db          = null;
let currentPage = 1;
let totalClips  = 0;
let searchQuery = '';
let sortBy      = 'view_count_desc';
let gameFilter  = '';
let searchTimer = null;

// ── Bootstrap ──────────────────────────────────────────────────────────────

async function init() {
  try {
    const SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
    });

    const res = await fetch(DB_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${DB_URL}`);

    const buf = await res.arrayBuffer();
    db = new SQL.Database(new Uint8Array(buf));

    document.getElementById('loading').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';

    setStreamerTag();
    populateGameFilter();
    bindEvents();
    render();
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.innerHTML =
      `<strong>Could not load the database.</strong><br>` +
      `${escHtml(err.message)}<br><br>` +
      `Make sure you are serving this page over HTTP (not <code>file://</code>) ` +
      `and that <code>data/clips.db</code> is accessible from the server root. ` +
      `Run: <code>python -m http.server 8000</code> from the worktree directory.`;
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────

function q(sql, params) {
  const res = db.exec(sql, params);
  if (!res.length) return [];
  const cols = res[0].columns;
  return res[0].values.map(row => Object.fromEntries(cols.map((c, i) => [c, row[i]])));
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtDuration(secs) {
  const s = Math.round(secs);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2, '0')}`;
}

function fmtViews(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric'
  });
}

// ── Populate UI from DB ───────────────────────────────────────────────────

function setStreamerTag() {
  const rows = q('SELECT display_name, login FROM streamers LIMIT 1');
  if (rows.length) {
    const { display_name, login } = rows[0];
    document.getElementById('streamer-tag').textContent =
      display_name ? `${display_name} (${login})` : login;
  }
}

function populateGameFilter() {
  const rows = q(`
    SELECT g.id, g.name, COUNT(c.id) as cnt
    FROM games g
    JOIN clips c ON c.game_id = g.id
    GROUP BY g.id
    ORDER BY cnt DESC
  `);
  const sel = document.getElementById('game-filter');
  for (const { id, name, cnt } of rows) {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = `${name} (${cnt.toLocaleString()})`;
    sel.appendChild(opt);
  }
}

// ── Query building ────────────────────────────────────────────────────────

function buildWhere() {
  const parts  = [];
  const params = {};
  if (searchQuery) {
    parts.push('c.title LIKE :search');
    params[':search'] = `%${searchQuery}%`;
  }
  if (gameFilter) {
    parts.push('c.game_id = :game');
    params[':game'] = gameFilter;
  }
  return {
    where:  parts.length ? `WHERE ${parts.join(' AND ')}` : '',
    params,
  };
}

const ORDER = {
  view_count_desc: 'c.view_count DESC',
  view_count_asc:  'c.view_count ASC',
  date_desc:       'c.created_at DESC',
  date_asc:        'c.created_at ASC',
};

// ── Render ────────────────────────────────────────────────────────────────

function render() {
  const { where, params } = buildWhere();

  const countRes = db.exec(`SELECT COUNT(*) FROM clips c ${where}`, params);
  totalClips = countRes[0].values[0][0];

  const offset = (currentPage - 1) * PAGE_SIZE;
  const clips = q(`
    SELECT c.id, c.title, c.creator_name, c.view_count,
           c.created_at, c.duration, c.thumbnail_url, c.url,
           COALESCE(g.name, '') AS game_name
    FROM clips c
    LEFT JOIN games g ON c.game_id = g.id
    ${where}
    ORDER BY ${ORDER[sortBy]}
    LIMIT ${PAGE_SIZE} OFFSET ${offset}
  `, params);

  document.getElementById('result-count').textContent =
    `${totalClips.toLocaleString()} clip${totalClips !== 1 ? 's' : ''}`;

  const grid  = document.getElementById('clips-grid');
  const empty = document.getElementById('empty');

  if (!clips.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = clips.map(c => `
      <div class="clip-card">
        <div class="clip-thumb">
          <a href="${escHtml(c.url)}" target="_blank" rel="noopener noreferrer">
            <img src="${escHtml(c.thumbnail_url)}" alt="${escHtml(c.title)}"
                 loading="lazy" onerror="this.classList.add('broken')">
            <div class="clip-play-icon">
              <svg viewBox="0 0 24 24" fill="white">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </div>
          </a>
          <span class="clip-duration">${fmtDuration(c.duration)}</span>
        </div>
        <div class="clip-info">
          <div class="clip-title">
            <a href="${escHtml(c.url)}" target="_blank" rel="noopener noreferrer">
              ${escHtml(c.title)}
            </a>
          </div>
          <div class="clip-meta">
            <span class="views">${fmtViews(c.view_count)} views</span>
            ${c.game_name ? `<span>${escHtml(c.game_name)}</span>` : ''}
            <span>by ${escHtml(c.creator_name)} &middot; ${fmtDate(c.created_at)}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(totalClips / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  // Build set of page numbers to show: first, last, current ± 2
  const show = new Set([1, totalPages]);
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
    show.add(i);
  }
  const sorted = [...show].sort((a, b) => a - b);

  const parts = [];
  parts.push(`<button id="pg-prev" ${currentPage === 1 ? 'disabled' : ''}>&#8249;</button>`);

  let prev = 0;
  for (const p of sorted) {
    if (p - prev > 1) parts.push(`<span class="pg-ellipsis">&hellip;</span>`);
    parts.push(`<button class="pg-btn${p === currentPage ? ' active' : ''}" data-page="${p}">${p}</button>`);
    prev = p;
  }
  parts.push(`<button id="pg-next" ${currentPage === totalPages ? 'disabled' : ''}>&#8250;</button>`);
  pg.innerHTML = parts.join('');

  pg.querySelector('#pg-prev').addEventListener('click', () => goPage(currentPage - 1));
  pg.querySelector('#pg-next').addEventListener('click', () => goPage(currentPage + 1));
  pg.querySelectorAll('.pg-btn').forEach(btn =>
    btn.addEventListener('click', () => goPage(Number(btn.dataset.page)))
  );
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Event binding ─────────────────────────────────────────────────────────

function bindEvents() {
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      currentPage = 1;
      render();
    }, 300);
  });

  document.getElementById('sort').addEventListener('change', e => {
    sortBy = e.target.value;
    currentPage = 1;
    render();
  });

  document.getElementById('game-filter').addEventListener('change', e => {
    gameFilter = e.target.value;
    currentPage = 1;
    render();
  });
}

init();
</script>
</body>
</html>
