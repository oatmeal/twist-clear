<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    Content-Security-Policy: GitHub Pages cannot set custom HTTP headers, so
    the CSP is declared here as a meta tag. Note that frame-ancestors is ignored
    in meta CSPs (HTTP header only); all other directives work in modern browsers.
    worker-src blob: is required by sql.js-httpvfs which creates workers via blob URLs.
    If the DB is hosted on a different origin (e.g. R2/S3), add it to connect-src.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    connect-src 'self' https://api.twitch.tv https://id.twitch.tv;
    frame-src https://clips.twitch.tv;
    img-src 'self' https://*.twitch.tv https://*.twitchsvc.net https://*.jtvnw.net data:;
    worker-src 'self' blob:;
  ">
  <title>%VITE_SITE_TITLE%</title>
  <meta property="og:title" content="%VITE_SITE_TITLE%">
  <meta property="og:description" content="%VITE_OG_DESCRIPTION%">
  <meta property="og:type" content="website">
  <meta property="og:url" content="%VITE_SITE_URL%">
  <meta property="og:image" content="%VITE_SITE_URL%og-image.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="calendar.css">
  <script type="module" src="/src/main.ts"></script>
</head>
<body>

<header>
  <div class="header-title">
    <div class="header-title-row">
      <h1>%VITE_SITE_TITLE%</h1>
      <span class="streamer-tag" id="streamer-tag"></span>
      <button id="btn-site-desc" class="site-desc-btn" aria-label="サイト説明" aria-expanded="false"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="2 4 6 8 10 4"/></svg></button>
    </div>
    <p class="site-desc" id="site-desc">%VITE_SITE_DESCRIPTION%</p>
  </div>
  <div id="header-controls">
    <div id="auth-indicator" style="display:none">
      <span id="auth-username"></span>
      <button id="btn-refresh-live" class="auth-btn icon-btn" title="新着クリップ更新" aria-label="新着クリップ更新"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13.5 8a5.5 5.5 0 1 1-1.07-3.3"/><polyline points="13.5 3.5 13.5 8 9 8"/></svg></button>
      <button id="btn-logout" class="auth-btn icon-btn" title="ログアウト" aria-label="ログアウト"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="10 5 13 8 10 11"/><line x1="13" y1="8" x2="6" y2="8"/></svg></button>
    </div>
    <div class="settings-wrapper" id="tz-wrapper">
      <button id="btn-settings" class="auth-btn" title="タイムゾーン" aria-label="タイムゾーン"><span id="tz-label">UTC</span></button>
      <div id="settings-panel" class="settings-panel" hidden>
        <label><span id="tz-label-text">タイムゾーン</span>
          <select id="tz-select"></select>
        </label>
      </div>
    </div>
    <button id="lang-toggle" class="lang-toggle" aria-label="Switch language"><span id="lang-opt-en" class="lang-opt">EN</span><span class="lang-divider" aria-hidden="true">/</span><span id="lang-opt-ja" class="lang-opt">JA</span></button>
  </div>
</header>

<div id="login-banner" style="display:none">
  <span id="banner-text"></span>
  <button id="btn-login" class="login-btn">Twitchでログイン</button>
  <button id="btn-dismiss-banner" class="banner-dismiss" aria-label="閉じる">&#x2715;</button>
</div>

<div id="controls">
  <div class="search-wrapper">
    <input type="search" id="search" placeholder="クリップタイトルを検索…" autocomplete="off">
    <button id="btn-search-help" class="search-help-btn" aria-label="検索ヘルプ" aria-haspopup="dialog">?</button>
  </div>
  <select id="sort">
    <option value="view_count_desc">再生回数が多い順</option>
    <option value="view_count_asc">再生回数が少ない順</option>
    <option value="date_desc" selected>新しい順</option>
    <option value="date_asc">古い順</option>
  </select>
  <!-- Collapse toggle: shown only on narrow screens; sits at the right of the
       search+sort row via margin-left:auto. -->
  <button id="btn-controls-toggle" class="controls-toggle-btn" aria-label="フィルターを折りたたむ"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="2 4 6 8 10 4"/></svg></button>
  <!-- Zero-size on wide screens; becomes full-width on narrow screens to push
       game-filter onto its own row. Also hidden when collapsed. -->
  <div class="controls-break-md collapsible-filter"></div>
  <select id="game-filter" class="collapsible-filter">
    <option value="">すべてのゲーム</option>
  </select>
  <!-- Always-on row break: game-filter stays above the date/view row on all
       screen sizes. Hidden when collapsed. -->
  <div class="controls-break collapsible-filter"></div>
  <!-- Calendar toggle + date inputs: grouped so they stay on the same row and
       only split from the grid/list switcher on the very narrowest screens. -->
  <div class="date-filter-group collapsible-filter">
    <button id="btn-view-cal" class="view-btn" aria-label="カレンダー" title="カレンダー"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="3" width="13" height="11" rx="1.5"/><line x1="1.5" y1="7" x2="14.5" y2="7"/><line x1="5" y1="1.5" x2="5" y2="4.5"/><line x1="11" y1="1.5" x2="11" y2="4.5"/></svg></button>
    <div class="date-range-filter">
      <input type="date" id="date-from-input" title="開始日">
      <span class="date-range-sep">–</span>
      <input type="date" id="date-to-input" title="終了日（当日含む）">
      <button id="btn-clear-dates" class="clear-dates-btn" aria-label="日付フィルターをクリア">&#x2715;</button>
    </div>
  </div>
  <!-- Grid / list switcher: wraps below date-filter-group on very narrow
       screens, carrying result-count to the right on the same row. -->
  <div class="view-switcher collapsible-filter">
    <button id="btn-view-grid" class="view-btn active" aria-label="グリッド表示" title="グリッド表示">⊞</button>
    <button id="btn-view-list" class="view-btn" aria-label="リスト表示" title="リスト表示">☰</button>
  </div>
  <span id="result-count" class="collapsible-filter"></span>
</div>

<main>
  <div id="live-section" style="display:none">
    <div id="live-section-header">
      <span id="live-section-title"></span>
      <button id="btn-live-toggle" class="live-toggle-btn" aria-label="折りたたむ"></button>
    </div>
    <div id="live-clips-grid"></div>
  </div>

  <div id="calendar-panel" style="display:none">
    <div id="cal-header">
      <div id="cal-breadcrumb"></div>
      <div id="cal-nav-controls">
        <div id="cal-year-nav">
          <button id="cal-prev-year">&#8249;</button>
          <select id="cal-year-select" class="cal-nav-select"></select>
          <button id="cal-next-year">&#8250;</button>
        </div>
        <div id="cal-month-nav" style="display:none">
          <button id="cal-prev-month">&#8249;</button>
          <select id="cal-month-select" class="cal-nav-select"></select>
          <button id="cal-next-month">&#8250;</button>
        </div>
        <div id="cal-day-nav" style="display:none">
          <button id="cal-prev-day">&#8249;</button>
          <select id="cal-day-select" class="cal-nav-select"></select>
          <button id="cal-next-day">&#8250;</button>
        </div>
      </div>
    </div>
    <div id="cal-year-view"></div>
    <div id="cal-month-view" style="display:none">
      <div id="cal-year-strip"></div>
      <div id="cal-month-grid"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">クリップデータベースを読み込み中…</p>
  </div>
  <div id="error"></div>
  <div id="empty">検索に一致するクリップがありません。</div>
  <div id="clips-grid"></div>
  <div id="pagination"></div>
</main>


<footer id="site-footer"></footer>

<dialog id="search-help-modal" aria-labelledby="search-help-modal-title">
  <div class="search-help-header">
    <h2 id="search-help-modal-title">検索の使い方</h2>
    <button id="btn-close-search-help" class="modal-close-btn" aria-label="閉じる">&#x2715;</button>
  </div>
  <table class="search-help-table">
    <tbody>
      <tr>
        <td><code>word1 word2</code></td>
        <td id="search-help-and">両方の語を含む（AND）</td>
      </tr>
      <tr>
        <td><code>word1 OR word2</code><br><code>word1 | word2</code><br><code>word1 ｜ word2</code></td>
        <td id="search-help-or">どちらかの語を含む（OR）</td>
      </tr>
      <tr>
        <td><code>-word</code></td>
        <td id="search-help-not">語を除外</td>
      </tr>
      <tr>
        <td><code>"exact phrase"</code></td>
        <td id="search-help-phrase">フレーズ検索</td>
      </tr>
    </tbody>
  </table>
  <p id="search-help-note" class="search-help-note">OR・|・｜ の前後にはスペースが必要です。</p>
</dialog>

</body>
</html>
