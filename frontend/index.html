<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    Content-Security-Policy: GitHub Pages cannot set custom HTTP headers, so
    the CSP is declared here as a meta tag. Note that frame-ancestors is ignored
    in meta CSPs (HTTP header only); all other directives work in modern browsers.
    worker-src blob: is required by sql.js-httpvfs which creates workers via blob URLs.
    If the DB is hosted on a different origin (e.g. R2/S3), add it to connect-src.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    connect-src 'self' https://api.twitch.tv https://id.twitch.tv;
    frame-src https://clips.twitch.tv;
    img-src 'self' https://*.twitch.tv https://*.twitchsvc.net https://*.jtvnw.net data:;
    worker-src 'self' blob:;
  ">
  <title>%VITE_SITE_TITLE%</title>
  <meta property="og:title" content="%VITE_SITE_TITLE%">
  <meta property="og:description" content="%VITE_OG_DESCRIPTION%">
  <meta property="og:type" content="website">
  <meta property="og:url" content="%VITE_SITE_URL%">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="calendar.css">
  <script type="module" src="/src/main.ts"></script>
</head>
<body>

<header>
  <h1>%VITE_SITE_TITLE%</h1>
  <span class="streamer-tag" id="streamer-tag"></span>
  <div id="header-controls">
    <div id="auth-indicator" style="display:none">
      <span id="auth-username"></span>
      <button id="btn-logout" class="auth-btn">ログアウト</button>
    </div>
    <div class="settings-wrapper" id="tz-wrapper">
      <button id="btn-settings" class="auth-btn" title="タイムゾーン" aria-label="タイムゾーン"><span id="tz-label">UTC</span></button>
      <div id="settings-panel" class="settings-panel" hidden>
        <label><span id="tz-label-text">タイムゾーン</span>
          <select id="tz-select"></select>
        </label>
      </div>
    </div>
    <button id="lang-toggle" class="lang-toggle" aria-label="Switch language"><span id="lang-opt-en" class="lang-opt">EN</span><span class="lang-divider" aria-hidden="true">/</span><span id="lang-opt-ja" class="lang-opt">JA</span></button>
  </div>
</header>

<div id="login-banner" style="display:none">
  <span id="banner-text"></span>
  <button id="btn-login" class="login-btn">Twitchでログイン</button>
  <button id="btn-dismiss-banner" class="banner-dismiss" aria-label="閉じる">&#x2715;</button>
</div>

<div id="controls">
  <input type="search" id="search" placeholder="クリップタイトルを検索…" autocomplete="off">
  <select id="sort">
    <option value="view_count_desc">再生回数が多い順</option>
    <option value="view_count_asc">再生回数が少ない順</option>
    <option value="date_desc" selected>新しい順</option>
    <option value="date_asc">古い順</option>
  </select>
  <select id="game-filter">
    <option value="">すべてのゲーム</option>
  </select>
  <div class="date-range-filter">
    <input type="date" id="date-from-input" title="From date">
    <span class="date-range-sep">–</span>
    <input type="date" id="date-to-input" title="To date (inclusive)">
  </div>
  <div class="view-switcher">
    <button id="btn-view-grid" class="view-btn active">一覧</button>
    <button id="btn-view-cal"  class="view-btn">カレンダー</button>
  </div>
  <span id="result-count"></span>
</div>

<main>
  <div id="live-section" style="display:none">
    <div id="live-section-header">
      <span id="live-section-title"></span>
      <button id="btn-live-toggle" class="live-toggle-btn" aria-label="Toggle new clips"></button>
    </div>
    <div id="live-clips-grid"></div>
  </div>

  <div id="calendar-panel" style="display:none">
    <div id="cal-header">
      <div id="cal-breadcrumb"></div>
      <div id="cal-nav-controls">
        <div id="cal-year-nav">
          <button id="cal-prev-year">&#8249;</button>
          <select id="cal-year-select" class="cal-nav-select"></select>
          <button id="cal-next-year">&#8250;</button>
        </div>
        <div id="cal-month-nav" style="display:none">
          <button id="cal-prev-month">&#8249;</button>
          <select id="cal-month-select" class="cal-nav-select"></select>
          <button id="cal-next-month">&#8250;</button>
        </div>
        <div id="cal-day-nav" style="display:none">
          <button id="cal-prev-day">&#8249;</button>
          <select id="cal-day-select" class="cal-nav-select"></select>
          <button id="cal-next-day">&#8250;</button>
        </div>
      </div>
    </div>
    <div id="cal-year-view"></div>
    <div id="cal-month-view" style="display:none">
      <div id="cal-year-strip"></div>
      <div id="cal-month-grid"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">クリップデータベースを読み込み中…</p>
  </div>
  <div id="error"></div>
  <div id="empty">検索に一致するクリップがありません。</div>
  <div id="clips-grid"></div>
  <div id="pagination"></div>
</main>


<footer id="site-footer"></footer>

</body>
</html>
