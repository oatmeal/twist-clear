name: Deploy to GitHub Pages

# Reusable workflow — call this from a viewer repo's workflow.
# See docs/deploying.md for setup instructions.
on:
  workflow_call:
    inputs:
      streamers:
        description: >
          Comma-separated list of Twitch channel logins to scrape
          (e.g. "streamer1,streamer2").
        required: true
        type: string
      scrape_mode:
        description: >
          Controls how clips are scraped on each run:
          - fetch (default): full historical rescan via scrape.py fetch --force.
            Refreshes view counts on every clip. Best for a single daily schedule.
          - update: restore cached DB then run scrape.py update (incremental,
            only new clips). Falls back to a full fetch if no cache exists. Best
            for frequent intra-day runs alongside a daily fetch run.
          - backfill: restore cached DB, run scrape.py update (incremental),
            then run scrape.py backfill to verify 0-clip coverage via bisection.
            Finds clips hidden by API suppression or bucket quantization.
            Falls back to a full fetch + backfill if no cache exists.
          - skip: restore cached DB and skip scraping entirely. Redeploys the
            site without touching the scraper. Useful for style or config changes.
            Fails with a clear error if no cached DB is available.
        required: false
        type: string
        default: fetch
      backfill_max_calls:
        description: >
          Maximum number of Twitch API calls the backfill step may make.
          Only applies when scrape_mode is "backfill". When the budget is
          reached, progress is saved and the next run resumes where this
          one left off. 0 or empty means unlimited.
        required: false
        type: number
        default: 0
      refresh_views_days:
        description: >
          Refresh view counts for existing clips by re-fetching them by ID
          via scrape.py refresh-views. Skipped when scrape_mode is "fetch"
          (which already refreshes all view counts during its full rescan).
          Negative means disabled (default: -1). 0 refreshes all clips.
          Positive N refreshes only clips created in the last N days.
        required: false
        type: number
        default: -1
      scraper_ref:
        description: >
          Branch, tag, or SHA of twist-clear to check out.
          Defaults to master.
        required: false
        type: string
        default: master
      code_repo:
        description: >
          GitHub repo containing the scraper code (owner/repo).
          Defaults to oatmeal/twist-clear. Override this if you are using
          a fork or a copy of the code under a different account.
        required: false
        type: string
        default: ''
      site_title:
        description: >
          Title prefix shown in the browser tab and page heading.
          Streamer names are appended automatically at runtime
          (e.g. "My favorite streamers: streamer1, streamer2").
          Defaults to "twist-clear clip viewer".
        required: false
        type: string
        default: 'twist-clear clip viewer'
      og_description:
        description: >
          Text for the og:description meta tag used in social link previews.
        required: false
        type: string
        default: 'A Twitch clip viewer.'
      site_heading:
        description: >
          HTML content for the <h1> page heading. Can contain HTML (e.g. an
          <img> tag for a custom icon). Falls back to site_title when omitted,
          so existing deployments need no change.
          Note: site_title remains plain text and continues to drive the browser
          tab title and og:title — only site_heading accepts HTML.
        required: false
        type: string
        default: ''
      site_description:
        description: >
          Optional subtitle shown in the page header below the site title.
          Visible on desktop; collapsible via a chevron button on narrow screens.
          Defaults to empty (no subtitle shown).
        required: false
        type: string
        default: ''
      site_url:
        description: >
          Canonical URL for the og:url meta tag
          (e.g. https://user.github.io/my-clips/).
          Auto-computed from the calling repo if omitted.
        required: false
        type: string
        default: ''
      accent_color:
        description: >
          Accent colour: interactive highlights, buttons, calendar heat-map.
          Accepts any valid CSS colour (hex, hsl(), oklch(), etc.).
          Overrides the default Twitch purple (#9147ff). All derived colours
          (hover tint, calendar ramp) update automatically via color-mix().
          See docs/theming.md for guidance and example palettes.
        required: false
        type: string
        default: ''
      color_bg:
        description: >
          Page background colour. Default: #0e0e0e (near-black).
        required: false
        type: string
        default: ''
      color_surface:
        description: >
          Card and header background colour. Default: #1f1f23.
        required: false
        type: string
        default: ''
      color_surface2:
        description: >
          Secondary surfaces: dropdowns, nav buttons. Default: #26262c.
        required: false
        type: string
        default: ''
      color_border:
        description: >
          Border and divider colour. Default: #3a3a40.
        required: false
        type: string
        default: ''
      color_text:
        description: >
          Primary text colour. Default: #efeff1 (near-white).
        required: false
        type: string
        default: ''
      color_muted:
        description: >
          Secondary text and labels colour. Default: #adadb8.
        required: false
        type: string
        default: ''
      cal_accent_color:
        description: >
          Calendar heat-map colour. Kept separate from accent_color so the
          density ramp reads as data rather than interactive UI. Default: #22a84a
          (mid-green). Set to match accent_color if you want them to track together.
        required: false
        type: string
        default: ''
    secrets:
      TWITCH_CLIENT_ID:
        required: true
      TWITCH_CLIENT_SECRET:
        required: true
      TWITCH_WEB_CLIENT_ID:
        description: >
          Client ID of a *Public* Twitch app used for implicit grant login in the browser.
          Must be a separate app from TWITCH_CLIENT_ID (which is Confidential).
          Optional — if omitted, the "Login with Twitch" button is hidden.
        required: false

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04   # ubuntu-22.04 ships SQLite 3.37 which is too old for FTS5 trigram (needs 3.38+)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out scraper + frontend code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ inputs.code_repo || 'oatmeal/twist-clear' }}
          ref: ${{ inputs.scraper_ref }}

      - name: Get code SHA
        id: code-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute site URL
        id: site-url
        run: |
          if [ -n "$INPUT_SITE_URL" ]; then
            echo "url=$INPUT_SITE_URL" >> "$GITHUB_OUTPUT"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            echo "url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi
        env:
          INPUT_SITE_URL: ${{ inputs.site_url }}

      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate config.toml
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          STREAMERS: ${{ inputs.streamers }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          cid = os.environ["TWITCH_CLIENT_ID"]
          csc = os.environ["TWITCH_CLIENT_SECRET"]
          logins = [s.strip() for s in os.environ["STREAMERS"].split(",") if s.strip()]
          lines = [
              "[twitch]",
              f'client_id     = "{cid}"',
              f'client_secret = "{csc}"',
              "",
              "[scraper]",
              'db_path = "data/clips.db"',
          ]
          for login in logins:
              lines += ["", "[[streamers]]", f'login = "{login}"']
          pathlib.Path("config.toml").write_text("\n".join(lines) + "\n")
          print(f"Generated config.toml with {len(logins)} streamer(s): {', '.join(logins)}")
          PYEOF

      - name: Install Python dependencies
        run: uv sync

      - name: Install Node dependencies
        run: npm --prefix frontend ci

      - name: Restore database cache
        id: restore-cache
        if: ${{ inputs.scrape_mode != 'fetch' }}
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: data/clips.db
          key: clips-db-${{ inputs.streamers }}-${{ github.run_id }}
          restore-keys: |
            clips-db-${{ inputs.streamers }}-

      - name: Scrape clips
        if: ${{ inputs.scrape_mode != 'skip' }}
        run: |
          mkdir -p data
          if [ "$SCRAPE_MODE" = "fetch" ] || [ -z "$CACHE_MATCHED_KEY" ]; then
            uv run python scrape.py fetch --force
          else
            uv run python scrape.py update
          fi
          if [ "$SCRAPE_MODE" = "backfill" ]; then
            BACKFILL_ARGS=""
            if [ -n "$BACKFILL_MAX_CALLS" ] && [ "$BACKFILL_MAX_CALLS" -gt 0 ] 2>/dev/null; then
              BACKFILL_ARGS="--max-calls $BACKFILL_MAX_CALLS"
            fi
            uv run python scrape.py backfill $BACKFILL_ARGS
          fi
          if [ -n "$REFRESH_VIEWS_DAYS" ] && [ "$REFRESH_VIEWS_DAYS" -ge 0 ] 2>/dev/null && [ "$SCRAPE_MODE" != "fetch" ]; then
            REFRESH_ARGS=""
            if [ "$REFRESH_VIEWS_DAYS" -gt 0 ]; then
              REFRESH_ARGS="--days $REFRESH_VIEWS_DAYS"
            fi
            uv run python scrape.py refresh-views $REFRESH_ARGS
          fi
        env:
          SCRAPE_MODE: ${{ inputs.scrape_mode }}
          BACKFILL_MAX_CALLS: ${{ inputs.backfill_max_calls }}
          REFRESH_VIEWS_DAYS: ${{ inputs.refresh_views_days }}
          CACHE_MATCHED_KEY: ${{ steps.restore-cache.outputs.cache-matched-key }}

      - name: Verify database available
        if: ${{ inputs.scrape_mode == 'skip' && !steps.restore-cache.outputs.cache-matched-key }}
        run: |
          echo "::error::scrape_mode=skip but no cached database was found. Run once without skip to populate the cache."
          exit 1

      - name: Enrich Japanese game names
        if: ${{ inputs.scrape_mode != 'skip' }}
        run: uv run python scrape.py enrich-names

      - name: Save database cache
        if: ${{ inputs.scrape_mode != 'skip' }}
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: data/clips.db
          key: clips-db-${{ inputs.streamers }}-${{ github.run_id }}

      - name: Prepare database
        run: npm --prefix frontend run prepare-db

      - name: Check out viewer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: _viewer

      - name: Copy viewer site assets
        run: |
          if [ -d "_viewer/site-assets" ]; then
            mkdir -p frontend/public
            cp -r _viewer/site-assets/. frontend/public/
            echo "Copied $(find _viewer/site-assets -type f | wc -l) file(s) from site-assets/ to frontend/public/"
          else
            echo "No site-assets/ directory in viewer repo — skipping"
          fi

      - name: Generate Shared Timestamp
        run: |
          # Save timestamp as GitHub Actions environment variable
          echo "VITE_TIMESTAMP=$(date +%s)" | tee -a $GITHUB_ENV

      - name: Build frontend
        run: npm --prefix frontend run build
        env:
          # Client ID of the Public Twitch app used for implicit grant login in the browser.
          # This is a different app from the Confidential app used by the scraper.
          # Safe to bake into the JS bundle — client_id is a public identifier.
          # If the secret is not set, the "Login with Twitch" button is hidden.
          VITE_TWITCH_CLIENT_ID: ${{ secrets.TWITCH_WEB_CLIENT_ID }}
          # Branding / metadata baked into the frontend bundle.
          VITE_SITE_TITLE:        ${{ inputs.site_title }}
          VITE_SITE_HEADING:      ${{ inputs.site_heading }}
          VITE_OG_DESCRIPTION:    ${{ inputs.og_description }}
          VITE_SITE_DESCRIPTION:  ${{ inputs.site_description }}
          VITE_SITE_URL:          ${{ steps.site-url.outputs.url }}
          # Footer: links back to the code repo and the viewer repo with commit SHAs.
          VITE_CODE_REPO:     ${{ inputs.code_repo || 'oatmeal/twist-clear' }}
          VITE_CODE_SHA:      ${{ steps.code-sha.outputs.sha }}
          VITE_VIEWER_REPO:   ${{ github.repository }}
          VITE_VIEWER_SHA:    ${{ github.sha }}
          # Optional colour overrides (empty string = CSS default in style.css :root).
          # See docs/theming.md for guidance and example palettes.
          VITE_COLOR_ACCENT:   ${{ inputs.accent_color }}
          VITE_COLOR_BG:       ${{ inputs.color_bg }}
          VITE_COLOR_SURFACE:  ${{ inputs.color_surface }}
          VITE_COLOR_SURFACE2: ${{ inputs.color_surface2 }}
          VITE_COLOR_BORDER:   ${{ inputs.color_border }}
          VITE_COLOR_TEXT:     ${{ inputs.color_text }}
          VITE_COLOR_MUTED:    ${{ inputs.color_muted }}
          VITE_COLOR_CAL_ACCENT: ${{ inputs.cal_accent_color }}

      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          fonts-noto-cjk \
          fonts-noto-cjk-extra

      - name: Generate OG screenshot
        # Uses system Chrome (pre-installed on ubuntu-24.04) via playwright-core
        # channel: 'chrome' — no browser download needed, no cache required.
        # Starts vite preview (port 4174), waits for the clip grid to render,
        # screenshots at 1200×630, writes frontend/dist/og-image.png.
        run: npm --prefix frontend run screenshot-og
        env:
          # vite.config.ts reads VITE_SITE_URL to compute viteBase, which
          # vite-node then injects as import.meta.env.BASE_URL. Without this,
          # the script would navigate to the root path instead of /<reponame>/.
          VITE_SITE_URL: ${{ steps.site-url.outputs.url }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
